# Phase 2 gate: prove headless Earth Engine auth works in CI via Workload Identity
# Federation — no downloaded service-account key. `google-github-actions/auth` swaps
# the runner's OIDC token for short-lived credentials and writes them as Application
# Default Credentials; validate_ee_headless.py --federated picks those up, runs one
# RTMA point query, and cross-checks it against NDFD. Run manually until it passes,
# then this file is the template for the real fetch_current cron.
name: ee-auth-smoke

on:
  workflow_dispatch:        # keepable manual smoke test for headless WIF auth

permissions:
  contents: read
  id-token: write           # REQUIRED: lets the job mint the OIDC token WIF consumes

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet earthengine-api google-auth

      # Exchanges the OIDC token for WIF credentials and exports ADC for later steps.
      # Both values come from the Cloud Shell setup output; store them as repo secrets
      # (they're not sensitive, but secrets keep the resource path out of logs).
      - uses: google-github-actions/auth@v3
        with:
          project_id: ca-carceral-heat
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Headless EE gate
        run: python3 pipeline/validate_ee_headless.py --federated
