# Phase 2 live pipeline: every 3 hours, fetch current conditions for all facilities
# and commit the refreshed JSON. The commit is what triggers the Cloudflare Pages
# rebuild (Phase 4 will move delivery to R2 and decouple from builds). Auth is keyless
# via Workload Identity Federation — same setup proven by ee-auth-smoke.yml.
name: fetch-current

on:
  schedule:
    # Temporary bump (2026-07-21 → revert ~2026-08-21): every 6 h at 05/11/17/23
    # UTC = ≈ 4am / 10am / 4pm / 10pm PT — captures a morning reading and an
    # afternoon-high reading (CA inland peak ~3-5pm PT) each day. ~4 commit-
    # rebuilds/day ≈ 120/mo, still well under the shared 500-build/mo quota.
    # AFTER the trial, revert to the daily "0 17 * * *" — or, once Phase 4 (R2)
    # decouples delivery from builds, this can go higher without rebuild cost.
    - cron: "0 5,11,17,23 * * *"
  workflow_dispatch:           # allow manual runs from the Actions tab anytime

# Never let two refreshes overlap or race the commit/push.
concurrency:
  group: fetch-current
  cancel-in-progress: false

permissions:
  contents: write              # commit refreshed data back to the repo
  id-token: write              # mint the OIDC token WIF consumes

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 40        # ~10-13 min expected; generous headroom
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        # cfgrib+eccodes ship binary wheels with a bundled ecCodes lib (no apt needed);
        # used to read the near-real-time RTMA GRIB2 from AWS for the current temp.
        run: pip install --quiet earthengine-api google-auth cfgrib eccodes xarray numpy

      - uses: google-github-actions/auth@v3
        with:
          project_id: ca-carceral-heat
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Fetch current conditions
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: python3 pipeline/fetch_current.py

      - name: Commit refreshed data
        run: |
          git config user.name "heat-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/statewide.json static/data/recent
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "data: refresh current conditions ($(date -u +%Y-%m-%dT%H:%MZ))"
            # A concurrent push (e.g. a UI commit landing mid-run) would otherwise
            # reject our non-fast-forward push and lose the fresh data. Rebase our
            # data commit on top of origin/main first, with a short retry loop.
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push attempt $attempt failed; retrying after rebase..."
              sleep $((attempt * 5))
            done
          fi
