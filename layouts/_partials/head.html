{{- /* <head> contents for the standalone app. No theme dependency. */ -}}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
{{- $title := .Title | default site.Title }}
{{- $isHome := .IsHome }}
<title>{{ if $isHome }}{{ site.Title }}{{ else }}{{ $title }} · {{ site.Title }}{{ end }}</title>
{{- $desc := .Description | default site.Params.description }}
<meta name="description" content="{{ $desc }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta name="robots" content="index, follow">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ if $isHome }}{{ site.Title }}{{ else }}{{ $title }}{{ end }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E">

<link rel="stylesheet" href="{{ "css/leaflet.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/cht.css" | relURL }}">
